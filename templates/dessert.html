<header><h1>Chocolate Brownie 🍫</h1></header>
<div class="recipe">
<img src="https://sallysbakingaddiction.com/wp-content/uploads/2015/03/no-bake-greek-yogurt-fruit-tart-3.jpg" alt="Dessert">
<h2>Ingredients:</h2>
<ul>
<li>1/2 cup butter</li>
<li>1 cup sugar</li>
<li>2 eggs, 1/3 cup cocoa</li>
<li>1/2 cup flour, vanilla</li>
</ul>
<h2>How to Make:</h2>
<p>Mix butter, sugar, and eggs. Add cocoa and flour. Bake at 180°C for 25 minutes. Cool and serve.</p>
