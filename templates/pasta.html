<div class="recipe">
<img src="https://s.lightorangebean.com/media/20240914160809/Spicy-Penne-Pasta_-done.png" alt="Pasta">
<h2>Ingredients:</h2>
<ul>
<li>200g pasta</li>
<li>1 cup milk, 2 tbsp butter</li>
<li>Cheese, garlic, salt, pepper</li>
</ul>
<h2>How to Make:</h2>
<p>Boil pasta. In butter, sauté garlic, add milk and cheese. Mix pasta and season well.</p>
