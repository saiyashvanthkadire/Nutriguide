<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Your Praise</title>
<link rel="stylesheet" href="/static/shareyourpairse.css">
<style>
  
</style>
</head>

<body>
{# The action attribute should point to the URL that handles form submission. #}
<form class="contact-container" action="/shareyourparses" method="post">
  <h2>Share Your Praise</h2>
 
  <label for="name">* Name:</label>
  <input type="text" id="name" name="name" placeholder="Your Name" required>
 
  <label for="email">* Email:</label>
  <input type="email" id="email" name="email" placeholder="Valid Email ID" required>

  <label for="message">* Message:</label>
  <textarea id="message" name="message" rows="6" placeholder="Your Feedback" required></textarea>
 
  <button type="submit" class="btn">Send</button>
</form>

</body>
</html>
