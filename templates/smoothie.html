<h2>Ingredients:</h2>
<ul>
<li>1 mango, peeled</li>
<li>1 cup milk or yogurt</li>
<li>1 tsp honey</li>
<li>Ice cubes</li>
</ul>
<h2>How to Make:</h2>
<p>Blend all ingredients until smooth. Pour into glass and serve chilled.</p>
