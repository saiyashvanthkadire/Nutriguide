<h2>Ingredients:</h2>
<ul>
<li>1 cup mixed vegetables</li>
<li>1 onion, chopped</li>
<li>2 cups vegetable stock</li>
<li>1 tsp pepper, salt to taste</li>
<li>1 tsp olive oil</li>
</ul>
<h2>How to Make:</h2>
<p>Sauté onions in oil, add vegetables and stock. Cook 10–15 minutes. Season and serve hot.</p>
